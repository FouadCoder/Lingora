name: lingora
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+8

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  go_router: ^15.1.2
  salomon_bottom_bar: ^3.3.2
  sidebarx: ^0.17.2
  flutter_bloc: ^9.1.1
  another_flushbar: ^1.12.31
  dio: ^5.7.0
  google_generative_ai: ^0.4.7
  flutter_staggered_grid_view: ^0.7.0
  percent_indicator: ^4.2.5
  supabase_flutter: ^2.8.4
  connectivity_plus: ^7.0.0
  uuid: ^4.5.1
  shimmer: ^3.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  lottie: ^3.2.0
  smooth_page_indicator: ^1.2.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4
  contribution_heatmap: ^0.3.1
  flutter_bidi_text: ^1.1.0
  carousel_slider: ^5.1.1
  animated_cards_carousel: ^1.0.2
  flutter_card_swiper: ^7.1.0
  get_it: ^9.0.5
  animations: ^2.1.0
  flutter_tts: ^4.2.3
  heroicons: ^0.11.0
  animated_bottom_navigation_bar: ^1.4.0
  flutter_tabler_icons: ^1.43.0
  liquid_pull_to_refresh: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/translations/
    - assets/animation/
    - assets/logo/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo/lingora_logo.png"
  adaptive_icon_background: "#000000" # Pure black background
  adaptive_icon_foreground: "assets/logo/lingora_logo.png" # For adaptive icons on Android

flutter_native_splash:
  color: "#000000" # Pure black background
  image: "assets/logo/lingora_logo.png" # Path to your splash image
  android: true
  ios: true
  web: false
